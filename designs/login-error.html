<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>登录 — Plan-Local</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--surface);
    }
    .auth-card {
      width: 100%;
      max-width: 380px;
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-stamp {
      width: 56px;
      height: 56px;
      background: var(--interactive);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      margin: 0 auto 16px;
    }
    .auth-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .field-input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--divider-medium);
      background: var(--surface-raised);
      font-size: 15px;
      color: var(--text-primary);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .field-input::placeholder {
      color: var(--text-muted);
    }
    .field-input:focus {
      border-color: var(--interactive);
      box-shadow: 0 0 0 3px var(--interactive-ghost);
    }
    .field-input.error {
      border-color: var(--danger);
      background: rgba(199, 91, 58, 0.04);
    }
    .field-error {
      font-size: 13px;
      color: var(--danger);
      line-height: 1.4;
      min-height: 18px;
    }
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--interactive);
      color: #fff;
      border-radius: var(--r-md);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      border: none;
      cursor: pointer;
      transition: background 150ms ease, transform 100ms ease;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--interactive-hover); }
    .btn-primary:active {
      background: var(--interactive-press);
      transform: scale(0.98);
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--interactive);
      font-weight: 500;
      text-decoration: none;
      transition: color 150ms ease;
    }
    .auth-footer a:hover {
      color: var(--interactive-hover);
      text-decoration: underline;
    }
    @media (max-width: 359px) {
      .auth-page { padding: 16px; }
      .auth-title { font-size: 18px; }
    }
    @media (max-height: 500px) {
      .auth-brand { margin-bottom: 20px; }
      .auth-stamp { width: 48px; height: 48px; font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-stamp">P</div>
        <div class="auth-title">欢迎回到 Perth 社区</div>
        <div class="auth-subtitle">登录后继续参与邻里讨论</div>
      </div>

      <form class="auth-form" onsubmit="event.preventDefault();">
        <div class="field-group">
          <label class="field-label" for="email">邮箱</label>
          <input
            type="email"
            id="email"
            class="field-input error"
            placeholder="your@email.com"
            autocomplete="email"
            value="wrong@example.com"
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="password">密码</label>
          <input
            type="password"
            id="password"
            class="field-input error"
            placeholder="输入密码"
            autocomplete="current-password"
          />
        </div>

        <div class="field-error">邮箱或密码不正确，请检查后重试</div>

        <button type="submit" class="btn-primary">登 录</button>
      </form>

      <div class="auth-footer">
        还没有账号？<a href="#">去注册</a>
      </div>

    </div>
  </div>

  <script>
    (function () {
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      const initial = document.documentElement.getAttribute('data-viewer-theme');
      if (initial) applyTheme(initial);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });
    })();
  </script>

</body>
</html>
