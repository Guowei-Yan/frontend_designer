<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed Empty — Plan-Local</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-layout {
      display: grid;
      gap: 48px;
      max-width: 1040px;
      margin: var(--topbar-height) auto 0;
      padding: 0 40px;
      align-items: start;
      grid-template-columns: minmax(0, 640px) 240px;
    }
    .feed-main { min-width: 0; }
    .feed-sidebar {
      padding-top: 40px;
      position: sticky;
      top: calc(var(--topbar-height) + 16px);
      max-height: calc(100vh - var(--topbar-height) - 32px);
      overflow-y: auto;
    }
    .feed-sidebar::-webkit-scrollbar { display: none; }
    .feed-sidebar { -ms-overflow-style: none; scrollbar-width: none; }
    @media (max-width: 1023px) {
      .page-layout { grid-template-columns: 1fr; max-width: 640px; padding: 0 20px; gap: 0; }
      .feed-sidebar { display: none; }
    }
    @media (max-width: 639px) {
      .page-layout { max-width: 100%; padding: 0; padding-bottom: 72px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-stamp">P</div>
      <span class="brand-city">Perth</span>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn topbar-search" title="搜索">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </button>
      <div class="topbar-user">
        <div class="avatar av-28 av-wealthy">
          <div class="avatar-img" style="background: linear-gradient(135deg, #E8B090 0%, #C07B50 100%);"></div>
        </div>
        <svg class="topbar-chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>
    </div>
  </header>

  <div class="page-layout">
    <main class="feed-main">

      <div style="text-align: center; padding: 100px 20px 80px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom: 16px;">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        <div style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Perth 社区刚刚开张</div>
        <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 280px; margin: 0 auto 24px;">
          这里还很安静，<br>但每个社区都是从第一条消息开始的。
        </div>
        <button style="display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: var(--r-md); background: var(--interactive); color: #fff; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font-body);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          写下第一条
        </button>
      </div>

    </main>

    <aside class="feed-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-city-header">
          <div class="sidebar-city-stamp">P</div>
          <div>
            <div class="sidebar-city-name">Perth 社区</div>
            <div class="sidebar-city-since">自 2024 年 3 月建立</div>
          </div>
        </div>
        <div class="sidebar-stat-grid">
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-value val-active">0</span>
            <span class="sidebar-stat-label">今日新帖</span>
          </div>
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-value">1</span>
            <span class="sidebar-stat-label">活跃用户</span>
          </div>
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-value">0</span>
            <span class="sidebar-stat-label">本月发帖</span>
          </div>
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-value val-success">0</span>
            <span class="sidebar-stat-label">已解决</span>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <button class="fab" title="写点什么">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5"  y1="12" x2="19" y2="12" />
    </svg>
    写点什么
  </button>

  <nav class="bottom-nav" aria-label="主导航">
    <div class="bnav-items">
      <button class="bnav-item bnav-active" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        首页
      </button>
      <button class="bnav-item" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        搜索
      </button>
      <button class="bnav-item" aria-label="发帖">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        发帖
      </button>
      <button class="bnav-item" aria-label="我的">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        我的
      </button>
    </div>
  </nav>

  <script>
    (function () {
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      const initial = document.documentElement.getAttribute('data-viewer-theme');
      if (initial) applyTheme(initial);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });
    })();
  </script>

</body>
</html>
