<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — Plan-Local</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- 品牌 -->
      <div class="auth-brand">
        <div class="auth-stamp">P</div>
        <div>
          <div class="auth-title">欢迎回到 Perth 社区</div>
        </div>
      </div>

      <!-- 表单 -->
      <form class="auth-form" novalidate>

        <div class="field-group">
          <label class="field-label" for="email">邮箱</label>
          <input
            id="email"
            class="field-input"
            type="email"
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="password">密码</label>
          <input
            id="password"
            class="field-input"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <div class="field-error-msg">邮箱或密码不正确，请重试</div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top: 4px;">
          登  录
        </button>

      </form>

      <div class="auth-footer">
        还没有账号？<a class="auth-link" href="#">去注册</a>
      </div>

    </div>
  </div>

  <script>
    (function () {
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      const initial = document.documentElement.getAttribute('data-viewer-theme');
      if (initial) applyTheme(initial);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });
    })();
  </script>

</body>
</html>
