<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Create Post (Empty) — Plan-Local</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-shell {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--topbar-height) 0 0;
    }
    @media (max-width: 639px) {
      .page-shell { padding-left: 0; padding-right: 0; }
    }
    .create-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-height);
      background: var(--surface);
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .create-topbar .btn-text {
      font-size: 15px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      padding: 6px 4px;
      border-radius: var(--r-xs);
      transition: color 150ms ease;
      flex-shrink: 0;
    }
    .create-topbar .btn-text:hover { color: var(--text-primary); }
    .create-topbar .btn-publish {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: not-allowed;
      font-family: var(--font-body);
      padding: 6px 4px;
      flex-shrink: 0;
      transition: color 150ms ease;
    }
    .create-form {
      padding: 16px var(--content-px) 24px;
    }
    .title-input-wrap { margin-bottom: 8px; }
    .title-input {
      width: 100%;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
      background: none;
      border: none;
      border-bottom: 1px solid var(--divider);
      padding: 8px 0 12px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 150ms ease;
    }
    .title-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
    .title-input:focus { border-color: var(--interactive); }
    .body-input-wrap { margin-bottom: 16px; }
    .body-input {
      width: 100%;
      min-height: 200px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      background: none;
      border: none;
      padding: 8px 0;
      font-family: var(--font-body);
      outline: none;
      resize: none;
    }
    .body-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
    .create-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--divider);
      position: sticky;
      bottom: 0;
      background: var(--surface);
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    .toolbar-icon-btn {
      width: 40px; height: 40px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
    }
    .toolbar-icon-btn:hover {
      background: var(--interactive-ghost);
      color: var(--text-primary);
    }
    .toolbar-icon-btn svg {
      width: 20px; height: 20px;
      stroke: currentColor; stroke-width: 1.5;
      fill: none;
    }
    @media (max-width: 359px) {
      .create-form { padding: 12px; }
      .title-input { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header class="create-topbar">
    <button class="btn-text">取消</button>
    <button class="btn-publish">发布</button>
  </header>

  <div class="page-shell">
    <div class="create-form">
      <div class="title-input-wrap">
        <input type="text" class="title-input" placeholder="标题" maxlength="60" />
      </div>
      <div class="body-input-wrap">
        <textarea class="body-input" placeholder="说点什么..."></textarea>
      </div>
      <div class="create-toolbar">
        <button class="toolbar-icon-btn" title="添加图片">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <button class="toolbar-icon-btn" title="添加视频">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="2"/>
            <polygon points="10 8 16 12 10 16 10 8"/>
          </svg>
        </button>
      </div>
    </div>
    <div style="height: 40px;"></div>
  </div>

  <script>
    (function () {
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      const initial = document.documentElement.getAttribute('data-viewer-theme');
      if (initial) applyTheme(initial);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });
    })();
  </script>
</body>
</html>
