<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发帖 — Plan-Local</title>
  <link rel="stylesheet" href="shared.css" />
  <style>

    /* ── 发帖面板覆盖整个视口 ──────────────────────────────── */

    body {
      overflow: hidden;
    }

    /* 底部灰色 Feed 背景（模拟面板覆盖 Feed） */
    .feed-bg {
      position: fixed;
      inset:    0;
      background: var(--surface);
    }

    /* 面板从底部滑出，覆盖全屏 */
    .create-panel {
      position:       fixed;
      inset:          0;
      background:     var(--surface-raised);
      display:        flex;
      flex-direction: column;
      z-index:        300;
    }

    /* ── 面板顶栏 ──────────────────────────────────────────── */

    .panel-topbar {
      height:        56px;
      display:       flex;
      align-items:   center;
      padding:       0 16px;
      border-bottom: 1px solid var(--divider);
      flex-shrink:   0;
      gap:           12px;
    }

    .panel-cancel {
      font-size:   15px;
      color:       var(--text-secondary);
      cursor:      pointer;
      border:      none;
      background:  none;
      font-family: var(--font-body);
      padding:     8px 4px;
      transition:  color 150ms ease;
    }

    .panel-cancel:hover { color: var(--text-primary); }

    .panel-title {
      flex:        1;
      text-align:  center;
      font-size:   15px;
      font-weight: 600;
      color:       var(--text-primary);
    }

    .panel-publish {
      font-size:   15px;
      font-weight: 600;
      color:       var(--interactive);
      cursor:      pointer;
      border:      none;
      background:  none;
      font-family: var(--font-body);
      padding:     8px 4px;
      transition:  opacity 150ms ease;
    }

    .panel-publish:disabled,
    .panel-publish[aria-disabled="true"] {
      color:  var(--text-muted);
      cursor: default;
    }

    /* ── 面板主体（滚动区） ────────────────────────────────── */

    .panel-body {
      flex:       1;
      overflow-y: auto;
      padding:    0 20px;
    }

    /* ── AI 标签建议 ───────────────────────────────────────── */

    .tag-suggest-row {
      display:     flex;
      align-items: center;
      gap:         8px;
      padding:     14px 0 4px;
    }

    .tag-suggest-label {
      font-size:  12px;
      color:      var(--text-muted);
      white-space: nowrap;
    }

    .tag-suggest-options {
      display:     flex;
      align-items: center;
      gap:         6px;
      flex-wrap:   wrap;
    }

    .tag-option {
      display:       inline-flex;
      align-items:   center;
      padding:       3px 10px;
      border-radius: var(--r-md);
      font-size:     12px;
      font-weight:   600;
      letter-spacing: 0.05em;
      cursor:        pointer;
      border:        none;
      font-family:   var(--font-body);
      transition:    background 150ms ease, color 150ms ease;
    }

    .tag-option.selected-help {
      color:       var(--cat-help);
      background:  rgba(199, 91, 58, 0.16);
      box-shadow:  0 0 0 1.5px var(--cat-help);
    }

    .tag-option.unselected {
      color:       var(--text-muted);
      background:  var(--interactive-ghost);
    }

    .tag-option.unselected:hover {
      color:       var(--text-secondary);
      background:  var(--interactive-ghost-hover);
    }

    /* ── 标题输入 ──────────────────────────────────────────── */

    .title-input-wrap {
      position:     relative;
      padding:      12px 0 0;
      border-bottom: 1px solid var(--divider);
    }

    .title-input {
      width:       100%;
      border:      none;
      outline:     none;
      background:  transparent;
      font-size:   18px;
      font-weight: 600;
      line-height: 1.5;
      color:       var(--text-primary);
      font-family: var(--font-body);
      resize:      none;
      padding:     0 0 12px;
      display:     block;
    }

    .title-input::placeholder {
      color:       var(--text-muted);
      font-weight: 600;
    }

    .title-char-count {
      position:   absolute;
      bottom:     8px;
      right:      0;
      font-size:  12px;
      color:      var(--text-muted);
      transition: color 150ms ease;
    }

    .title-char-count.warn { color: var(--warning); }

    /* ── 正文输入 ──────────────────────────────────────────── */

    .body-input {
      width:       100%;
      min-height:  200px;
      border:      none;
      outline:     none;
      background:  transparent;
      font-size:   15px;
      line-height: 1.7;
      color:       var(--text-secondary);
      font-family: var(--font-body);
      resize:      none;
      padding:     16px 0 0;
      display:     block;
    }

    .body-input::placeholder { color: var(--text-muted); }

    /* ── 媒体缩略图行 ──────────────────────────────────────── */

    .media-thumbnails {
      display:     flex;
      gap:         8px;
      padding:     16px 0 0;
      overflow-x:  auto;
      scrollbar-width: none;
    }

    .media-thumbnails::-webkit-scrollbar { display: none; }

    .thumb-item {
      position:      relative;
      width:         64px;
      height:        64px;
      border-radius: var(--r-sm);
      flex-shrink:   0;
      overflow:      hidden;
    }

    .thumb-img {
      width:         100%;
      height:        100%;
      object-fit:    cover;
      border-radius: var(--r-sm);
    }

    .thumb-del {
      position:        absolute;
      top:             3px;
      right:           3px;
      width:           18px;
      height:          18px;
      background:      rgba(26, 24, 22, 0.60);
      border-radius:   50%;
      display:         flex;
      align-items:     center;
      justify-content: center;
      color:           #fff;
      font-size:       12px;
      cursor:          pointer;
      line-height:     1;
      border:          none;
      font-family:     var(--font-body);
    }

    .thumb-progress {
      position:   absolute;
      inset:      0;
      background: rgba(26, 24, 22, 0.38);
      display:    flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-add {
      width:           64px;
      height:          64px;
      border:          1.5px dashed var(--divider-medium);
      border-radius:   var(--r-sm);
      display:         flex;
      align-items:     center;
      justify-content: center;
      cursor:          pointer;
      flex-shrink:     0;
      color:           var(--text-muted);
      transition:      border-color 150ms ease, color 150ms ease;
      background:      none;
    }

    .thumb-add:hover {
      border-color: var(--interactive);
      color:        var(--interactive);
    }

    .thumb-add svg {
      width:        20px;
      height:       20px;
      stroke:       currentColor;
      stroke-width: 1.5;
      fill:         none;
    }

    /* ── 底部工具栏 ────────────────────────────────────────── */

    .panel-toolbar {
      height:        52px;
      display:       flex;
      align-items:   center;
      padding:       0 16px;
      border-top:    1px solid var(--divider);
      gap:           4px;
      flex-shrink:   0;
    }

    .toolbar-btn {
      width:           40px;
      height:          40px;
      border-radius:   var(--r-md);
      display:         flex;
      align-items:     center;
      justify-content: center;
      color:           var(--text-secondary);
      cursor:          pointer;
      transition:      background 150ms ease, color 150ms ease;
      border:          none;
      background:      none;
    }

    .toolbar-btn:hover {
      background: var(--interactive-ghost);
      color:      var(--text-primary);
    }

    .toolbar-btn svg {
      width:        20px;
      height:       20px;
      stroke:       currentColor;
      stroke-width: 1.5;
      fill:         none;
    }

    .toolbar-count {
      font-size:   12px;
      color:       var(--text-muted);
      margin-left: 2px;
    }

    /* ── 发布预览状态 ──────────────────────────────────────── */

    .preview-topbar {
      height:        56px;
      display:       flex;
      align-items:   center;
      padding:       0 16px;
      border-bottom: 1px solid var(--divider);
      flex-shrink:   0;
      gap:           12px;
    }

    .preview-hint {
      font-size:   13px;
      color:       var(--text-muted);
      text-align:  center;
      padding:     16px 20px 8px;
    }

    .preview-card-wrap {
      padding: 0 20px 16px;
    }

    /* 预览卡片复用 post-item 样式 */
    .preview-card {
      border:        1.5px solid var(--divider-medium);
      border-radius: var(--r-md);
      overflow:      hidden;
    }

    /* ── 响应式 ────────────────────────────────────────────── */

    @media (min-width: 640px) {
      .create-panel {
        max-width:     640px;
        left:          50%;
        transform:     translateX(-50%);
        right:         auto;
        border-radius: var(--r-xl) var(--r-xl) 0 0;
        box-shadow:    0 -4px 32px rgba(0, 0, 0, 0.10);
        top:           40px;
      }

      .panel-body { padding: 0 28px; }
      .panel-toolbar { padding: 0 24px; }
      .preview-hint  { padding: 16px 28px 8px; }
      .preview-card-wrap { padding: 0 28px 20px; }
    }

  </style>
</head>
<body>

  <div class="feed-bg"></div>

  <!-- ══════════════════════════════════════════════════════════
       CREATE PANEL — 初始状态（输入中）
  ══════════════════════════════════════════════════════════ -->
  <div class="create-panel" id="panel-compose">

    <div class="panel-topbar">
      <button class="panel-cancel">取消</button>
      <span class="panel-title">写点什么</span>
      <button class="panel-publish">发布</button>
    </div>

    <div class="panel-body">

      <!-- AI 标签建议 -->
      <div class="tag-suggest-row">
        <span class="tag-suggest-label">AI 建议：</span>
        <div class="tag-suggest-options">
          <button class="tag-option selected-help">求助</button>
          <button class="tag-option unselected">推荐</button>
          <button class="tag-option unselected">活动</button>
          <button class="tag-option unselected">闲聊</button>
        </div>
      </div>

      <!-- 标题 -->
      <div class="title-input-wrap">
        <textarea
          class="title-input"
          rows="2"
          placeholder="标题"
          maxlength="60"
        >厨房下水堵了三天了，求推荐靠谱的管道工</textarea>
        <span class="title-char-count">18/60</span>
      </div>

      <!-- 正文 -->
      <textarea
        class="body-input"
        placeholder="说点什么..."
      >试过了超市买的通渠剂，倒了整整两瓶完全没用。楼下邻居已经开始抱怨有渗水，今晚必须解决掉，急！有没有之前找过师傅的朋友能推荐一下？</textarea>

      <!-- 已上传图片缩略图 -->
      <div class="media-thumbnails">

        <div class="thumb-item">
          <div class="thumb-img" style="background: linear-gradient(160deg, #8A6850 0%, #6A4830 100%);"></div>
          <button class="thumb-del">×</button>
        </div>

        <div class="thumb-item">
          <div class="thumb-img" style="background: linear-gradient(150deg, #A08878 0%, #806858 100%);"></div>
          <!-- 上传中进度 -->
          <div class="thumb-progress">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="2" />
              <path d="M12 3 A9 9 0 0 1 21 12" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
        </div>

        <button class="thumb-add" title="添加图片">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>

      </div>

    </div>

    <div class="panel-toolbar">
      <button class="toolbar-btn" title="添加图片">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
      </button>
      <span class="toolbar-count">2/16</span>

      <button class="toolbar-btn" title="添加视频" style="margin-left: 4px;">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="23 7 16 12 23 17 23 7" />
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
        </svg>
      </button>

    </div>

  </div>


  <!-- ══════════════════════════════════════════════════════════
       PREVIEW PANEL — 发布前预览
       （通常在点击"发布"后替换 compose 面板；这里并排展示）
  ══════════════════════════════════════════════════════════ -->
  <!--
    注意：在实际使用中这两个面板只会显示其中一个。
    此处为设计展示同时渲染，使 design-view 可以看到两种状态。
    可通过 design-view 宽度调整或查看两种面板尺寸。
    移动端仅显示 compose 面板（preview 面板在其后方，通过 ID 可切换）。
  -->


  <!-- ══════════════════════════════════════════════════════════
       THEME SYNC
  ══════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      }
      const initial = document.documentElement.getAttribute('data-viewer-theme');
      if (initial) applyTheme(initial);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'THEME_CHANGE') applyTheme(e.data.theme);
      });

      const tagOptions = document.querySelectorAll('.tag-option');
      tagOptions.forEach(function (btn) {
        btn.addEventListener('click', function () {
          tagOptions.forEach(function (b) {
            b.className = 'tag-option unselected';
          });
          btn.className = 'tag-option selected-help';
        });
      });
    })();
  </script>

</body>
</html>
